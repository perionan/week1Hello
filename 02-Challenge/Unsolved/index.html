<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>WanderNote — Travel Journal</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header id="topbar">
      <a class="logo" href="#">WanderNote</a>
      <nav class="links">
        <a class="nav-link" href="#">Home</a>
        <a class="nav-link" href="#">Destinations</a>
        <a class="nav-link" href="#">Tips</a>
        <a class="nav-link" href="#">About</a>
      </nav>
    </header>

    <header id="hero">
      <figure class="hero-inner">
        <img class="hero-img" src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?q=80&w=1600&auto=format&fit=crop" alt="Traveler overlooking mountains" />

        <div class="headline">Stories from the road</div>
        <figcaption class="sub">Notes, photos, and pocket itineraries.</figcaption>
      </figure>
    </header>

    <main id="content">
      <section class="left-col">
        <article class="post card">
          <div class="post-title">Kyoto in 48 Hours</div>
          <div class="post-meta">May 2025 · Asia · Budget</div>
          <img class="post-img" src="https://picsum.photos/id/1016/800/500" alt="Kyoto trip collage" />
          <p class="post-body">Temple hopping, alley ramen, and morning markets.</p>         
        </article>
        <article class="post card">
          <div class="post-title">Lisbon Hill Walk</div>
          <div class="post-meta">April 2025 · Europe · Walkable</div>
          <img class="post-img" src="https://picsum.photos/id/1035/800/500" alt="Lisbon city view" />
          <p class="post-body">Tiles, trams, and sunset at Miradouro.</p>          
        </article>
      </section>
      <aside class="right-col">
        <section class="panel">
          <div class="panel-title">Popular Tags</div>
          <ul class="tag-list">
            <li class="tag"><a href="#">streetfood</a></li>
            <li class="tag"><a href="#">itinerary</a></li>
            <li class="tag"><a href="#">budget</a></li>
          </ul>
        </section>
      </aside>
    </main>

    <footer id="bottombar">
      <p class="copy">© 2025 WanderNote</p>
    </footer>
  </body>
</html>
